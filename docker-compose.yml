services:
  postgres:
    image: postgres:16
    container_name: webhook_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: webhook_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: webhook_api
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/webhook_pipeline?schema=public
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && npm run start"

  worker:
    build: .
    container_name: webhook_worker
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/webhook_pipeline?schema=public
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: sh -c "npx prisma migrate deploy && npm run start:worker"

volumes:
  postgres_data: